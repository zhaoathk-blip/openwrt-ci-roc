name: Build-Packages

on:
  workflow_dispatch:
    inputs:
      sdk_version:
        description: 可选：OpenWrt SDK 版本，ALL 表示全部版本，稳定版自动使用对应系列最新版本，main 使用主线 snapshots。
        required: false
        default: main
        type: choice
        options:
          - ALL
          - main
          - '25.12'
          - '24.10'
          - '23.05'
      arch:
        description: 可选：要编译的架构，ALL 表示全部。
        required: false
        default: ALL
        type: choice
        options:
          - ALL
          - x86-64
          - aarch64
      package:
        description: 可选：要编译的软件包，ALL 表示全部。
        required: false
        default: ALL
        type: choice
        options:
          - ALL
          - aria2
          - ariang
          - frp
          - nginx
          - gecoosac
          - luci-app-aria2
          - luci-app-frpc
          - luci-app-frps
          - luci-app-gecoosac
  workflow_call:
    inputs:
      sdk_version:
        required: false
        default: main
        type: string
      arch:
        required: false
        default: ALL
        type: string
      package:
        required: false
        default: ALL
        type: string

permissions:
  contents: write

defaults:
  run:
    shell: bash

env:
  TZ: Asia/Shanghai
  OUTPUT_DIR: ${{ github.workspace }}/artifacts/packages

jobs:
  Prepare:
    name: Prepare Matrix(准备编译矩阵)
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
    - name: Generate Build Matrix(生成编译矩阵)
      id: matrix
      env:
        SELECTED_ARCH: ${{ inputs.arch }}
        SELECTED_SDK_VERSION: ${{ inputs.sdk_version }}
      run: |
        python3 - <<'PY' >> "$GITHUB_OUTPUT"
        import json
        import os

        selected_arch = os.environ["SELECTED_ARCH"]
        selected_sdk_version = os.environ["SELECTED_SDK_VERSION"]

        sdk_versions = ["main", "25.12", "24.10", "23.05"]
        architectures = ["x86-64", "aarch64"]

        if selected_sdk_version == "ALL":
            selected_sdk_versions = sdk_versions
        elif selected_sdk_version in sdk_versions:
            selected_sdk_versions = [selected_sdk_version]
        else:
            raise SystemExit(f"Unsupported sdk_version: {selected_sdk_version}")

        if selected_arch == "ALL":
            selected_architectures = architectures
        elif selected_arch in architectures:
            selected_architectures = [selected_arch]
        else:
            raise SystemExit(f"Unsupported arch: {selected_arch}")

        def build_for(sdk_version, architecture):
            if architecture == "x86-64":
                return {
                    "sdk_version": sdk_version,
                    "name": "x86-64",
                    "openwrt_target": "x86",
                    "openwrt_subtarget": "64",
                    "openwrt_target_profile": "",
                    "config_files": "configs/x86-64.config configs/Packages.config",
                }

            if sdk_version in {"23.05", "24.10"}:
                return {
                    "sdk_version": sdk_version,
                    "name": "aarch64",
                    "openwrt_target": "mediatek",
                    "openwrt_subtarget": "filogic",
                    "openwrt_target_profile": "rax3000m",
                    "config_files": "configs/Packages.config",
                }

            return {
                "sdk_version": sdk_version,
                "name": "aarch64",
                "openwrt_target": "qualcommax",
                "openwrt_subtarget": "ipq60xx",
                "openwrt_target_profile": "",
                "config_files": "configs/JDCloud.config configs/Packages.config",
            }

        include = [
            build_for(sdk_version, architecture)
            for sdk_version in selected_sdk_versions
            for architecture in selected_architectures
        ]

        print(f"matrix={json.dumps({'include': include}, separators=(',', ':'))}")
        PY

  Build:
    name: Build (${{ matrix.sdk_version }} / ${{ matrix.name }})
    runs-on: ubuntu-24.04
    needs: Prepare
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.Prepare.outputs.matrix) }}
    concurrency:
      group: packages-${{ matrix.sdk_version }}-${{ matrix.name }}-${{ github.ref }}
      cancel-in-progress: false

    steps:
    - name: Check Server Performance(检查服务器性能)
      run: |
        echo "--------------------------CPU信息--------------------------"
        echo "CPU物理数量：$(grep "physical id" /proc/cpuinfo | sort | uniq | wc -l)"
        echo -e "CPU核心信息：$(grep name /proc/cpuinfo | cut -f2 -d: | uniq -c) \n"
        echo "--------------------------内存信息--------------------------"
        free -h
        echo "--------------------------硬盘信息--------------------------"
        df -hT

    - name: Initialization Environment(初始化环境)
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo -E apt-get -y update
        sudo -E apt-get -y install \
          build-essential \
          clang \
          curl \
          file \
          flex \
          bison \
          g++ \
          gawk \
          gcc-multilib \
          gettext \
          git \
          libelf-dev \
          libncurses-dev \
          libssl-dev \
          python3 \
          python3-setuptools \
          rsync \
          tar \
          unzip \
          wget \
          xz-utils \
          zlib1g-dev \
          zstd
        sudo timedatectl set-timezone "$TZ"

    - name: Checkout(检出代码)
      uses: actions/checkout@v4

    - name: Build Packages With OpenWrt SDK(使用OpenWrt SDK编译软件包)
      env:
        OPENWRT_TARGET: ${{ matrix.openwrt_target }}
        OPENWRT_SUBTARGET: ${{ matrix.openwrt_subtarget }}
        OPENWRT_TARGET_PROFILE: ${{ matrix.openwrt_target_profile }}
        PACKAGE_CONFIG_FILES: ${{ matrix.config_files }}
        PACKAGE_ARCH_NAME: ${{ matrix.name }}
        PACKAGE_SELECTION: ${{ inputs.package }}
        OPENWRT_SDK_VERSION: ${{ matrix.sdk_version }}
      run: |
        chmod +x scripts/SDK-script.sh
        scripts/SDK-script.sh

    - name: Upload Packages Artifact(上传软件包产物)
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.sdk_version }}-Packages-${{ matrix.name }}
        path: artifacts/packages/*
        if-no-files-found: error

  Release:
    runs-on: ubuntu-24.04
    needs: Build
    if: ${{ !cancelled() && needs.Build.result == 'success' }}

    steps:
    - name: Download Packages Artifacts(下载软件包产物)
      uses: actions/download-artifact@v4
      with:
        pattern: ${{ inputs.sdk_version == 'ALL' && '*-Packages-*' || format('{0}-Packages-*', inputs.sdk_version) }}
        path: artifacts/release
        merge-multiple: true

    - name: Upload Packages To Release(发布软件包)
      uses: ncipollo/release-action@v1
      with:
        name: Packages
        allowUpdates: true
        replacesArtifacts: true
        artifactErrorsFailBuild: true
        tag: Packages
        token: ${{ github.token }}
        artifacts: artifacts/release/*
        body: |
          **OpenWrt 软件包**
          - SDK 来源：${{ inputs.sdk_version }}（ALL 同时编译 main/25.12/24.10/23.05，main 使用 OpenWrt snapshots，23.05/24.10/25.12 自动使用对应系列最新稳定版本）
          - x86-64 配置文件：x86/64，configs/x86-64.config + configs/Packages.config
          - aarch64 配置文件：main/25.12 使用 qualcommax/ipq60xx，configs/JDCloud.config + configs/Packages.config；23.05/24.10 使用 mediatek/filogic，SDK脚本内置rax3000m配置 + configs/Packages.config
          - 选择的架构：${{ inputs.arch }}
          - 选择的 SDK：${{ inputs.sdk_version }}
          - 选择的软件包：${{ inputs.package }}
          - 源码来源：[laipeng668/packages](https://github.com/laipeng668/packages)（aria2、ariang、frp-binary-toml、nginx分支）、[laipeng668/luci](https://github.com/laipeng668/luci)（frp-toml分支）、[laipeng668/luci-app-gecoosac](https://github.com/laipeng668/luci-app-gecoosac)（main分支）
          - 安装说明：`apk` 软件包安装命令 `apk add --allow-untrusted *`
